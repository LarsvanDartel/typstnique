source = "H(X) = - sum_(i = 1)^n P(x_i) log_2 P(x_i)"

[[problem]]
title = "Pinsker's inequality"
source = "norm(mu - nu)_\"TV\" <= sqrt(2 D_\"KL\" (mu||nu))"

[[problem]]
title = "Condtional Entropy"
source = "upright(H)(Y|X) = -sum_(x in cal(X), y in cal(Y)) p(x, y) log p(x, y) / p(x)"

[[problem]]
title = "Beta Function"
source = "B(x, y) = integral_0^1 t^(x - 1) (1 - t)^(y - 1) dif t"

[[problem]]
title = "Moist Adiabatic Lapse Rate"
source = "Gamma_\"w\" = - (dif T) / (dif z) = g ((1 + (H_\"v\" r) / (R_\"sd\" T))) / ((c_\"pd\" + (H_\"v\"^2 r) / (R_\"sw\" T^2)))"

[[problem]]
title = "Cardano's Formula"
source = "root(3, - q / 2 + sqrt(q^2 / 4) + p^3 / 27) + root(3, - q / 2 - sqrt(q^2 / 4) + p^3 / 27)"

[[problem]]
title = "General Cubic Formula"
source = "C = root(3, (Delta_1 plus.minus sqrt(Delta_1^2 - 4 Delta_0^3)) / 2)"

[[problem]]
title = "Tangent Sum of Angles Formula"
source = "tan(alpha plus.minus beta) = (tan(alpha) plus.minus tan(beta)) / (1 minus.plus tan(alpha) tan (beta))"

[[problem]]
title = "Inner Product of Continuous Complex Valued Functions"
source = "chevron(f\\, g) = integral_0^(2 pi) f(t) overline(g(t)) dif t"

[[problem]]
title = "Definition of a Psuedorandom Generator"
source = "abs(op(\"Pr\")_(x <- {0, 1}^k) [cal(A)(G(x)) = 1] - op(\"Pr\")_(x <- {0, 1}^(p(k))) [cal(A)(x) = 1 ]) < mu (k)"

[[problem]]
title = "Generalized Stokes' theorem"
source = "integral_(partial M) omega = integral_M dif omega"

[[problem]]
title = "Cartan's magic formula"
source = "cal(L)_X = dif compose iota_X + iota_X compose dif"

[[problem]]
title = "Ridge Regression"
source = "ell(upright(bold(w))) = 1 / N norm(upright(bold(X w)) - upright(bold(y)))_2^2 + lambda norm(upright(bold(w)))_2^2"

[[problem]]
title = "Evidence Lower Bound (ELBO)"
source = "L(phi.alt, theta; x) = EE_(z tilde q_phi.alt (dot|x)) [ ln (p_theta (x, z)) / (q_phi.alt (z | x))]"

[[problem]]
title = "Langevin Dynamics (Overdamped)"
source = "dif x_t = -nabla U(x_t) dif t + sqrt(2 beta^(-1)) dif W_t"
[[problem]]
title = "Schrodinger's Equation"
source = "i planck partial / (partial t) Psi = H Psi"

[[problem]]
title = "Heisenberg's Uncertainty Principle"
source = "Delta x Delta p approx planck"

[[problem]]
title = "Principle of Inclusion-Exclusion"
source = "abs(A union B) = abs(A) + abs(B) - abs(A inter B)"

[[problem]]
title = "General Principle of Inclusion-Exclusion"
source = "abs(union.big_(i = 1)^n A_i) = sum_(emptyset != J subset.eq {1, ..., n}) (-1)^(abs(J) + 1) abs(inter.big_(j in J) A_j)"

[[problem]]
title = "Spectral Decomposition"
source = "A = mat(|, |,, |; upright(bold(v))_1, upright(bold(v))_2, dots.c, upright(bold(v))_n; |, |,, |) mat(lambda_1,,, ; , lambda_2,, ; ,, dots.down, ; ,,, lambda_n)mat(|, |,, |; upright(bold(v))_1, upright(bold(v))_2, dots.c, upright(bold(v))_n; |, |,, |)"

[[problem]]
title = "Wigner Transform of the Density Matrix"
source = "W(x, p) = 1 / (pi planck) integral_(-oo)^oo chevron(x + y|hat(rho)|x - y) e^(- 2 i p y \\/ planck) dif y"

[[problem]]
title = "Power Mean"
source = "M_r (x_1, x_2, ..., x_n) = cases((1/n sum_(i = 1)^n x_i^r)^(1 \\/ r) & quad r != 0, root(n, product_(i = 1)^n x_i) & quad r = 0)"

[[problem]]
title = "Alternating Harmonic Series"
source = "1 - 1 / 2 + 1 / 3 - 1 / 4 + 1 / 5 - dots.c = ln 2"

[[problem]]
title = "Mertens' therorem"
source = "product_(p in PP)^n (1 - 1/p) ~ e^(-gamma) / (log n)"

[[problem]]
title = "Rademacher Complexity"
source = "cal(R)_n (cal(F)) = EE_epsilon.alt [sup_(f in cal(F)) 1 / n sum_(i = 1)^n epsilon.alt_i f(x_i) ]"

[[problem]]
title = "Definition of the Euler Totient Function"
source = "phi(n) = abs({k in NN_(<= n) | gcd(k, n) = 1}) = n product_(p divides n) (1 - 1 / p)"

[[problem]]
title = "Wigner Semicircle Distribution"
source = "f(x) = cases(2 / (pi R^2) sqrt(R^2 - x^2) & quad -R <= x <= R, 0 & quad abs(x) > R)"

[[problem]]
title = "Quaternion Multiplication Formula"
source = "upright(bold(i))^2 = upright(bold(j))^2 = upright(bold(k))^2 = upright(bold(i j k)) = -1"

[[problem]]
title = "Dirac Equation"
source = "i planck gamma^mu partial_mu psi-  m c psi = 0"

[[problem]]
title = "Center of Mass"
source = "upright(bold(R)) = 1 / M integral.triple_Q rho(upright(bold(r))) upright(bold(r)) dif V"

[[problem]]
title = "Sackur-Tetrode equation"
source = "S / (k_B N) = ln [V / N ((4 pi m) / (3 h^2) U / N)^(3 \\/ 2)] + 5 / 2"

[[problem]]
title = "Force-Potential Relation"
source = "upright(bold(F)) = - (partial U) / (partial x) hat(upright(bold(i))) - (partial U) / (partial y) hat(upright(bold(j))) - (partial U) / (partial z) hat(upright(bold(k))) = -harpoon(nabla)(U)"

[[problem]]
title = "Riemann Zeta Function"
source = "zeta(s) = 1 / Gamma(s) integral_0^oo x^(s - 1) / (e^x - 1) dif x"
